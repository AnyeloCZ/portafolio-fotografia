<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Anyelo Casas</title>
    <style>
        :root {
            --bg: #0d1117;
            --accent: #58a6ff; /* Azul GitHub profesional */
            --text: #c9d1d9;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 1px solid #30363d;
            border-radius: 12px;
            background: #161b22;
        }
        h1 { margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: #8b949e; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Anyelo Casas</h1>
        <p>Proyecto Final de Fotografía - Tercer Corte</p>
        <a href="PortafolioFinal_AnyeloCasas.pdf" class="btn">Ver Proyecto Completo (PDF)</a>
    </div>
</body>
</html>
